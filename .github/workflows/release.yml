name: release
### Workflow for testing, building and releasing cert-manager-webhook-loopia ###
### Tests are executed using a test-fixure supplied that build up a complete Kubernetes control plane ###
### Container image is published to GitHub Packages / GHCR ###

# Run on push tag or manually.
on:
  workflow_dispatch:
  push:
    tags:
      - '*'
    branches:
      - main
    paths:
      - "**.go"
      - "**.mod"
      - "**.sum"
      - "**.yaml"
      - "Dockerfile"
jobs:
  # Build container image and push to GitHub Packages / GHCR.
  release_github_package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Echo...
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."

      # Check out code, required to get latest tag.
      - name: Check out code
        uses: actions/checkout@v2

      # Get latest tag
      - name: 'Get previous tag'
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@v1"
        with:
          fallback: 1.1 # Optional fallback tag to use when no tag can be found

      # Get GITHUB_REPOSITORY and lowercase it to GHCR_IMAGE env variable.
      - name: Set GHCR image env
        run: echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Test GHCR image env
        run: |
          echo $GHCR_IMAGE
          echo ${{ env.GHCR_IMAGE }}

      # Download a specific version of the Go tool.
      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.16.5

      # Create and boot a Docker-BuildX-builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # Log in to GitHub Container Registry.
      - name: Login to GHCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build using Dockerfile and push to GitHub Packages / GHCR.
      - name: Build and push to GHCR
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ env.GHCR_IMAGE }}:latest, ${{ env.GHCR_IMAGE }}:${{ steps.previoustag.outputs.tag }}

  # Build helm chart and push to GitHub Pages (depends on teststrict).
  release_helmchart:
    runs-on: ubuntu-latest
    steps:

    # Check out code.
    - name: Check out code
      uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

    - name: Run chart-releaser
      uses: helm/chart-releaser-action@v1.0.0
      env:
        CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
